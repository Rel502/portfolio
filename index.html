<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="./css/fonts.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/utilities.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/main.js" defer></script>
</head>

<body>
    <div class="landing">
        <section id="hero" class="hero">
            <div class="hero-left">
                <div class="hero-image-wrapper">
                    <img src="./assets/img/profile-transparent.png" alt="Foto von M. Zeitler" class="hero-image">
                </div>
            </div>

            <div class="hero-right">
                <div class="hero-socials">
                    <a href="mailto:deine-mail@example.com" class="social-link social-link--email"
                        aria-label="E-Mail schreiben"></a>

                    <a href="#" class="social-link social-link--github" aria-label="GitHub Profil öffnen"></a>

                    <a href="#" class="social-link social-link--linkedin" aria-label="LinkedIn Profil öffnen"></a>
                </div>

                <div class="hero-logo logo logo--hero">
                    <img src="./assets/icons/logo.svg" alt="" class="logo-icon">

                    <span class="logo-text">
                        <span class="logo-name">M. Zeitler</span>
                        <span class="logo-role">developer</span>
                    </span>
                </div>

                <div class="hero-intro">
                    <h1>Michael Zeitler</h1>
                    <p>Frontend Developer</p>
                </div>

                <a href="#about" class="scroll-down" aria-label="Zur nächsten Section scrollen">
                    <img src="./assets/icons/arrow-down-default.svg" alt="">
                </a>
            </div>
        </section>

        <header class="header">
            <nav class="navbar">
                <a href="#hero" class="logo" aria-label="Zur Startseite">
                    <img src="./assets/icons/logo-dark-mob.svg" alt="" class="logo-icon">

                    <span class="logo-text">
                        <span class="logo-name">M. Zeitler</span>
                        <span class="logo-role">developer</span>
                    </span>
                </a>

                <ul class="nav-list">
                    <li><a href="#about">Why me</a></li>
                    <li><a href="#skills">Skills</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>

                <div class="language-switch">
                    <button type="button" class="language-btn">DE</button>
                    <button type="button" class="language-btn active">EN</button>
                </div>
            </nav>
        </header>
    </div>

    <main>
        <section id="about" class="about"></section>
        <section id="skills" class="skills"></section>
        <section id="projects" class="projects"></section>
        <section id="contact" class="contact"></section>
    </main>

    <footer></footer>
</body>

</html>
